[package]
name = "pyre-jit"
version.workspace = true
edition.workspace = true
description = "Auto-generated JIT for pyre — rpython/jit/ equivalent"

[dependencies]
pyre-interp = { path = "../pyre-interp" }
pyre-runtime = { path = "../pyre-runtime" }
pyre-bytecode = { path = "../pyre-bytecode" }
pyre-object = { path = "../pyre-object" }
majit-ir = { path = "../../majit/majit-ir" }
majit-meta = { path = "../../majit/majit-meta" }
majit-codegen = { path = "../../majit/majit-codegen" }
majit-codegen-cranelift = { path = "../../majit/majit-codegen-cranelift" }
majit-opt = { path = "../../majit/majit-opt" }
majit-trace = { path = "../../majit/majit-trace" }

[build-dependencies]
majit-analyze = { path = "../../majit/majit-analyze" }
serde_json = "1"
syn = { version = "2", features = ["full", "visit"] }
