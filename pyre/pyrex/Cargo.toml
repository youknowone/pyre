[package]
name = "pyrex"
version.workspace = true
edition.workspace = true
description = "pyre executable — Python Yet Reforged Entirely"

[[bin]]
name = "pyre"
path = "src/main.rs"

[dependencies]
pyre-object = { workspace = true }
pyre-runtime = { workspace = true }
pyre-bytecode = { workspace = true }
pyre-interp = { workspace = true }
pyre-jit = { path = "../pyre-jit" }
lexopt = "0.3"
