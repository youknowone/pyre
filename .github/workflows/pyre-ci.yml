name: pyre CI

on:
  push:
    branches: [ "main", "py3.[0-9]+" ]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "majit/**/*"
      - "pyre/**/*"
      - ".github/workflows/pyre-ci.yml"
  pull_request:
    branches: [ "main", "py3.[0-9]+" ]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "majit/**/*"
      - "pyre/**/*"
      - ".github/workflows/pyre-ci.yml"
  workflow_dispatch:

concurrency:
  group: pyre-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  cargo-test:
    name: cargo test (${{ matrix.os }}, ${{ matrix.backend }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest, windows-latest]
        backend: [dynasm, cranelift]

    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
    - name: Run cargo test for ${{ matrix.backend }}
      run: cargo test --all --no-default-features --features ${{ matrix.backend }}

  pyre-check:
    name: pyre/check.py (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - name: Set up CPython
      id: cpython
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"
    - name: Set up PyPy
      id: pypy
      uses: actions/setup-python@v5
      with:
        python-version: "pypy3.11"
    - uses: Swatinem/rust-cache@v2
    - name: Run pyre/check.py
      env:
        PYRE_CHECK_PYTHON3: ${{ steps.cpython.outputs.python-path }}
        PYRE_CHECK_PYPY3: ${{ steps.pypy.outputs.python-path }}
      run: ${{ steps.cpython.outputs.python-path }} pyre/check.py
